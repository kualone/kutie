<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Dialog</title>
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
  <div id="app-root">
    <header class="titlebar" data-kutie-drag-region>
      <div class="titlebar-title">Modal Dialog</div>
      <div class="titlebar-controls">
        <button type="button" class="titlebar-btn" data-action="minimize" title="Minimize" aria-label="Minimize">
          <svg viewBox="0 0 12 12" aria-hidden="true"><rect x="1" y="5.5" width="10" height="1" fill="currentColor"/></svg>
        </button>
        <button type="button" class="titlebar-btn" data-action="maximize" title="Maximize" aria-label="Maximize">
          <svg viewBox="0 0 12 12" aria-hidden="true"><rect x="1.5" y="1.5" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1"/></svg>
        </button>
        <button type="button" class="titlebar-btn close" data-action="close" title="Close" aria-label="Close dialog">
          <svg viewBox="0 0 12 12" aria-hidden="true"><path d="M1 1 L11 11 M11 1 L1 11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </button>
      </div>
    </header>

    <div class="app-scroll">
      <main class="content">
        <section class="card">
          <h2>Modal Dialog</h2>
          <p>This window uses a custom HTML titlebar (<code>frame: false</code>). Maximize keeps the titlebar and window controls visible.</p>
          <p>The parent window is disabled until you close this dialog.</p>
          <p id="window-meta" class="output"></p>
        </section>
      </main>
    </div>
  </div>

  <script src="/scripts/titlebar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!window.kutie) return;
      const win = kutie.BrowserWindow.getCurrent();
      const all = await kutie.BrowserWindow.getAll();
      document.getElementById('window-meta').textContent =
        `Window id=${win.id}, open windows=${all.length}`;
    });
  </script>
</body>
</html>
