<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Independent Window</title>
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
  <div id="app-root">
    <header class="titlebar" data-kutie-drag-region>
      <div class="titlebar-title">Independent Window</div>
      <div class="titlebar-controls">
        <button type="button" class="titlebar-btn" data-action="minimize" title="Minimize" aria-label="Minimize">
          <svg viewBox="0 0 12 12" aria-hidden="true"><rect x="1" y="5.5" width="10" height="1" fill="currentColor"/></svg>
        </button>
        <button type="button" class="titlebar-btn" data-action="maximize" title="Maximize" aria-label="Maximize">
          <svg viewBox="0 0 12 12" aria-hidden="true"><rect x="1.5" y="1.5" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1"/></svg>
        </button>
        <button type="button" class="titlebar-btn close" data-action="close" title="Close" aria-label="Close">
          <svg viewBox="0 0 12 12" aria-hidden="true"><path d="M1 1 L11 11 M11 1 L1 11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </button>
      </div>
    </header>

    <div class="app-scroll">
      <main class="content">
        <section class="card">
          <h2>Independent Window</h2>
          <p>No <code>parent_id</code> — this window has its <strong>own taskbar button</strong> on Windows.</p>
          <p>It can stay open while you interact with the main window.</p>
          <div class="row">
            <button id="btn-open-nested" type="button">Open child from here</button>
          </div>
          <p id="window-meta" class="output"></p>
        </section>
      </main>
    </div>
  </div>

  <script src="/scripts/titlebar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!window.kutie) return;
      const win = kutie.BrowserWindow.getCurrent();
      document.getElementById('window-meta').textContent = `Window id=${win.id}`;

      document.getElementById('btn-open-nested').addEventListener('click', async () => {
        await kutie.BrowserWindow.create({
          title: 'Nested Child',
          url: 'https://assets.kutie/child-window.html',
          width: 400,
          height: 260,
          parent_id: win.id,
          frame: false,
          center: true,
        });
      });
    });
  </script>
</body>
</html>
